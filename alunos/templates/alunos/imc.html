{% extends "alunos/base.html" %}

{% block content %}

<h2>Cálculo de IMC</h2>

<div class="card p-4">

<form method="post">

{% csrf_token %}

<div class="mb-3">

<label>Peso (kg)</label>

<input class="form-control" type="number" step="0.01" name="peso" required>

</div>

<div class="mb-3">

<label>Altura (m)</label>

<input class="form-control" type="number" step="0.01" name="altura" required>

</div>

<button class="btn btn-primary">Calcular IMC</button>

</form>

</div>

{% if imc %}

<div class="alert alert-info mt-4">

<h4>Resultado</h4>

<p><b>IMC:</b> {{ imc }}</p>

<p><b>Classificação:</b> {{ classificacao }}</p>

<p><b>Exercícios sugeridos:</b> {{ exercicio }}</p>

</div>

{% endif %}

{% endblock %}
