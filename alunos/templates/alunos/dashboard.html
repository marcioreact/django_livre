{% extends "alunos/base.html" %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4 text-center">Dashboard da Academia</h2>

    <div class="row g-4 justify-content-center">
        <div class="col-md-3">
            <div class="card shadow border-0 rounded-4 text-center p-3">
                <div class="card-body">
                    <div class="mb-2">
                        <i class="bi bi-people-fill text-primary" style="font-size:40px"></i>
                    </div>
                    <h6 class="text-muted">Total de Alunos</h6>
                    <h2 class="fw-bold">{{ total_alunos }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow border-0 rounded-4 text-center p-3">
                <div class="card-body">
                    <div class="mb-2">
                        <i class="bi bi-person-check-fill text-success" style="font-size:40px"></i>
                    </div>
                    <h6 class="text-muted">Presentes Agora</h6>
                    <h2 class="fw-bold">{{ presentes }}</h2>
                </div>
            </div>
        </div>
    </div> </div> <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
{% endblock %}

{% block botao_voltar %}
{% endblock %}
